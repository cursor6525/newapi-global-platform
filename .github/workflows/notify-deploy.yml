name: 📢 Notify Deployment Status

on:
  push:
    branches: [ main ]
    paths:
      - 'clusters/**'
  workflow_dispatch:
    inputs:
      region:
        description: 'Target region (cn/us/eu/ap)'
        required: true
        default: 'cn'
      environment:
        description: 'Environment (production/staging)'
        required: false
        default: 'production'

env:
  DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
  WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}

jobs:
  notify-start:
    name: Notify Deployment Start
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Send DingTalk notification
        if: env.DINGTALK_WEBHOOK != ''
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DINGTALK_WEBHOOK }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "🚀 NewAPI 部署开始",
                "text": "#### 🚀 NewAPI 部署开始\n- **区域**: ${{ github.event.inputs.region }}\n- **环境**: ${{ github.event.inputs.environment }}\n- **触发人**: ${{ github.actor }}\n- **时间**: ${{ github.event.head_commit.timestamp }}\n- **Commit**: ${{ github.sha }}\n\n> 部署正在进行中，请稍候..."
              }
            }

      - name: Send WeCom notification
        if: env.WECOM_WEBHOOK != ''
        uses: joeycheng1129/github-actions-wecom-bot@master
        with:
          webhook: ${{ secrets.WECOM_WEBHOOK }}
          msgtype: 'markdown'
          content: |
            #### 🚀 NewAPI 部署开始
            - **区域**: ${{ github.event.inputs.region }}
            - **环境**: ${{ github.event.inputs.environment }}
            - **触发人**: ${{ github.actor }}
            - **时间**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}

  validate-and-notify:
    name: Validate and Notify
    runs-on: ubuntu-latest
    needs: notify-start
    if: always() && github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v1
        with:
          kustomize-version: '5.0.0'

      - name: Build and validate
        id: build
        run: |
          REGION="${{ github.event.inputs.region }}"
          echo "Building configuration for region: $REGION"
          
          if [ -d "clusters/regions/$REGION" ]; then
            kustomize build "clusters/regions/$REGION" > /tmp/manifests.yaml
            echo "✅ Configuration built successfully"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Region $REGION not found"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Notify success
        if: steps.build.outputs.success == 'true'
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DINGTALK_WEBHOOK }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "✅ 部署验证成功",
                "text": "#### ✅ 部署验证成功\n- **区域**: ${{ github.event.inputs.region }}\n- **环境**: ${{ github.event.inputs.environment }}\n- **验证结果**: Kubernetes 配置校验通过\n- **触发人**: ${{ github.actor }}\n- **时间**: ${{ github.event.head_commit.timestamp }}\n\n> 配置已准备就绪，可以应用到集群"
              }
            }

      - name: Notify failure
        if: failure()
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DINGTALK_WEBHOOK }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "❌ 部署验证失败",
                "text": "#### ❌ 部署验证失败\n- **区域**: ${{ github.event.inputs.region }}\n- **环境**: ${{ github.event.inputs.environment }}\n- **触发人**: ${{ github.actor }}\n- **时间**: ${{ github.event.head_commit.timestamp }}\n- **错误**: 配置验证失败，请检查日志\n\n> ⚠️ 请立即检查并修复配置"
              }
            }

  auto-notify-on-push:
    name: Auto Notify on Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Send notification
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DINGTALK_WEBHOOK }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "🔄 配置更新",
                "text": "#### 🔄 配置更新\n- **分支**: ${{ github.ref_name }}\n- **提交人**: ${{ github.actor }}\n- **时间**: ${{ github.event.head_commit.timestamp }}\n- **消息**: ${{ github.event.head_commit.message }}\n- **Commit**: ${{ github.sha }}\n\n> FluxCD 将自动同步此配置到集群"
              }
            }

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [notify-start, validate-and-notify]
    if: always() && github.event_name == 'workflow_dispatch'
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ github.event.inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.validate-and-notify.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-and-notify.result }}" == "success" ]; then
            echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed!** Please check the logs." >> $GITHUB_STEP_SUMMARY
          fi
