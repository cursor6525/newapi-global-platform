name: 🔍 Validate Configuration

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'clusters/**'
      - 'manifests/**'
      - 'configs/**'

jobs:
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v1
        with:
          kustomize-version: '5.0.0'

      - name: Validate Kustomize
        run: |
          echo "Validating Kustomize configurations..."
          for dir in clusters/regions/*/ clusters/global/*/ clusters/edges/*/; do
            if [ -f "$dir/kustomization.yaml" ]; then
              echo "Validating $dir"
              kustomize build "$dir" > /dev/null || exit 1
            fi
          done
          echo "✅ All Kustomize configurations are valid"

      - name: Set up kubeval
        uses: instrumenta/setup-kubeval@v1
        with:
          kubeval-version: '0.16.1'

      - name: Validate Kubernetes YAML
        run: |
          echo "Validating Kubernetes YAML syntax..."
          find clusters manifests -name "*.yaml" -o -name "*.yml" | while read file; do
            echo "Validating $file"
            kubeval "$file" --strict || exit 1
          done
          echo "✅ All Kubernetes YAML files are valid"

  validate-netbird-acl:
    name: Validate NetBird ACL Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate JSON syntax
        run: |
          echo "Validating NetBird ACL JSON syntax..."
          for file in manifests/netbird/*.json configs/netbird/*.json; do
            if [ -f "$file" ]; then
              echo "Validating $file"
              python3 -m json.tool "$file" > /dev/null || exit 1
            fi
          done
          echo "✅ All NetBird ACL JSON files are valid"

  validate-configs:
    name: Validate Configuration Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate CSV format
        run: |
          echo "Validating CSV files..."
          for file in configs/routing/*.csv; do
            if [ -f "$file" ]; then
              echo "Validating $file"
              # Check CSV format (basic validation)
              head -1 "$file" | grep -q "^#" || echo "Warning: $file should have header comments"
            fi
          done
          echo "✅ All CSV files are valid"

      - name: Validate Markdown syntax
        run: |
          echo "Validating Markdown files..."
          for file in docs/*.md configs/compliance/*.md; do
            if [ -f "$file" ]; then
              echo "Checking $file exists and is readable"
              cat "$file" > /dev/null || exit 1
            fi
          done
          echo "✅ All Markdown files are valid"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          # Check for common secret patterns (excluding .env.example)
          if grep -r "password.*=.*[^example]" --include="*.yaml" --include="*.yml" --include="*.json" \
            --exclude=".env.example" . | grep -v "CHANGELOG.md"; then
            echo "❌ Potential secrets found in code!"
            exit 1
          fi
          echo "✅ No obvious secrets found in code"

      - name: Check for hardcoded IPs in sensitive files
        run: |
          echo "Checking for hardcoded sensitive configurations..."
          # This is a warning, not a failure
          if grep -r "100\.64\." --include="*.yaml" --include="*.yml" clusters/ | head -5; then
            echo "⚠️  Found NetBird IP references (this is expected)"
          fi
          echo "✅ Configuration check complete"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-k8s, validate-netbird-acl, validate-configs, security-scan]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-k8s.result }}" == "success" ]; then
            echo "| Kubernetes Manifests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Kubernetes Manifests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.validate-netbird-acl.result }}" == "success" ]; then
            echo "| NetBird ACL | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| NetBird ACL | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.validate-configs.result }}" == "success" ]; then
            echo "| Configuration Files | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Configuration Files | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "| Security Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security Scan | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**All validations completed!** 🎉" >> $GITHUB_STEP_SUMMARY
