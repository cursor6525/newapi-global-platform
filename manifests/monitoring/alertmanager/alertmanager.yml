global:
  resolve_timeout: 5m
  smtp_smarthost: ''
  smtp_from: ''

route:
  group_by: ['alertname', 'severity', 'region']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'dingtalk-critical'
  routes:
    - match:
        severity: warning
      receiver: 'dingtalk-warning'
    - match:
        severity: critical
      receiver: 'dingtalk-critical'

receivers:
  - name: 'dingtalk-critical'
    webhook_configs:
      - url: '${DINGTALK_WEBHOOK:-https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN}'
        send_resolved: true
        title: '🚨 [{{ .Status | toUpper }}] NewAPI 严重告警'
        text: |
          #### 🚨 NewAPI 严重告警
          - **告警**: {{ .CommonAnnotations.summary }}
          - **详情**: {{ .CommonAnnotations.description }}
          - **区域**: {{ .GroupLabels.region }}
          - **时间**: {{ .StartAt | date "2006-01-02 15:04:05" }}
          - **操作**: [查看 Grafana](http://grafana:3000)

  - name: 'dingtalk-warning'
    webhook_configs:
      - url: '${DINGTALK_WEBHOOK:-https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN}'
        send_resolved: true
        title: '⚠️ [{{ .Status | toUpper }}] NewAPI 警告'
        text: |
          #### ⚠️ NewAPI 警告
          - **告警**: {{ .CommonAnnotations.summary }}
          - **建议**: {{ .CommonAnnotations.description }}
          - **区域**: {{ .GroupLabels.region }}
          - **时间**: {{ .StartAt | date "2006-01-02 15:04:05" }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'region']
