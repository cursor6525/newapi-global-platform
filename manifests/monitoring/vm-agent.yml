version: "3.8"
services:
  vm-agent:
    image: victoriametrics/vmagent:latest
    container_name: vm-agent
    restart: unless-stopped
    command: >
      -promscrape.config=/etc/vmagent/prometheus.yml
      -remoteWrite.url=http://victoria-metrics:8428/api/v1/write
      -remoteWrite.tmpDataPath=/tmp/vmagent
    ports:
      - "8429:8429"
    volumes:
      - ./vmagent/prometheus.yml:/etc/vmagent/prometheus.yml:ro
      - vmagent-data:/tmp/vmagent
    depends_on:
      - victoria-metrics
    networks:
      - monitoring-network

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoria-metrics
    restart: unless-stopped
    command: >
      -retentionPeriod=30d
      -storageDataPath=/victoria-metrics-data
      -httpListenAddr=0.0.0.0:8428
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/victoria-metrics-data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8428/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring-network

volumes:
  vmagent-data:
  vm-data:

networks:
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
