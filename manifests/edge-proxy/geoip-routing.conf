# GeoIP2 地域识别与路由映射
geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
    auto_reload 5m;
    $geoip2_data_country_code default=US source=$remote_addr country iso_code;
}

# 地域 → 区域集群映射
map $geoip2_data_country_code $target_region {
    default         "us";
    "CN"            "cn";
    "TW"            "cn";
    "HK"            "cn";
    "MO"            "cn";
    "US"            "us";
    "CA"            "us";
    "MX"            "us";
    "GB"            "eu";
    "DE"            "eu";
    "FR"            "eu";
    "IT"            "eu";
    "ES"            "eu";
    "NL"            "eu";
    "JP"            "ap";
    "SG"            "ap";
    "AU"            "ap";
    "KR"            "ap";
    "IN"            "ap";
}

# 区域集群上游定义
upstream region-cn {
    server 100.64.1.100:80;
    keepalive 32;
    check interval=3000 rise=2 fall=3 timeout=1000;
}

upstream region-us {
    server 100.64.2.100:80;
    keepalive 32;
    check interval=3000 rise=2 fall=3 timeout=1000;
}

upstream region-eu {
    server 100.64.3.100:80;
    keepalive 32;
    check interval=3000 rise=2 fall=3 timeout=1000;
}

upstream region-ap {
    server 100.64.4.100:80;
    keepalive 32;
    check interval=3000 rise=2 fall=3 timeout=1000;
}

# 反向代理配置
server {
    listen 80;
    listen 443 ssl http2;
    server_name api.newapi.global;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location / {
        # 添加地域标记
        proxy_set_header X-User-Region $geoip2_data_country_code;
        proxy_set_header X-Target-Region $target_region;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        # 就近路由到区域层
        proxy_pass http://region-$target_region;

        # 连接优化
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 日志记录地域信息
    log_format geoip_combined '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'region=$geoip2_data_country_code target=$target_region';
    access_log /var/log/nginx/access-geoip.log geoip_combined;
}
