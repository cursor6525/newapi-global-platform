# Lua WAF 核心配置
lua_package_path "/usr/local/openresty/lualib/?.lua;;";
lua_shared_dict limit 10m;
lua_shared_dict block_ip 10m;

# CC 防护规则
init_by_lua_block {
    limit = require "resty.limit.req"
}

# 主配置
server {
    listen 80;
    listen 443 ssl http2;
    server_name api.newapi.global;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # CC 防护
    access_by_lua_block {
        local limit_req, err = limit.new("limit", 10, 100)
        if not limit_req then
            ngx.log(ngx.ERR, "failed to instantiate limit_req: ", err)
            return
        end

        local key = ngx.var.binary_remote_addr
        local delay, err = limit_req:incoming(key, true)
        if not delay then
            if err == "limit" then
                ngx.status = 429
                ngx.say("Too Many Requests")
                return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
            end
            ngx.log(ngx.ERR, "failed to record req: ", err)
            return
        end

        if delay >= 0.001 then
            ngx.sleep(delay)
        end
    }

    # Bot 拦截
    set $block_bot 0;
    if ($http_user_agent ~* "(Scrapy|curl|wget|Python-requests|Go-http-client)") {
        set $block_bot 1;
    }
    if ($block_bot = 1) {
        return 403;
    }

    # 地域封禁（需 GeoIP2 模块）
    # if ($geoip2_country_code = "XX") { return 403; }

    location / {
        proxy_pass http://100.64.1.100:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Region $geoip2_data_country_code;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
