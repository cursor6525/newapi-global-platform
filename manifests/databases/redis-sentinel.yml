version: "3.8"
services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-RedisPass123!} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-RedisPass123!}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - redis-network

  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel
    restart: unless-stopped
    command: >
      redis-sentinel /usr/local/etc/redis/sentinel.conf
      --sentinel monitor mymaster redis-master 6379 2
      --sentinel down-after-milliseconds mymaster 30000
      --sentinel failover-timeout mymaster 180000
      --sentinel parallel-syncs mymaster 1
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - redis-network

volumes:
  redis-master-data:

networks:
  redis-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
