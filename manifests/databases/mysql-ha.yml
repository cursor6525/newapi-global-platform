version: "3.8"
services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-ChangeMe123!}
      MYSQL_DATABASE: newapi_${REGION:-cn}
      MYSQL_USER: newapi
      MYSQL_PASSWORD: ${DB_USER_PASS:-NewApi123!}
    ports:
      - "3306:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql/master.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --binlog-do-db=newapi_${REGION:-cn}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-ChangeMe123!}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - db-network

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-ChangeMe123!}
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./mysql/slave.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command: >
      --server-id=2
      --relay-log=mysql-relay-bin
      --read-only=ON
      --log-slave-updates=ON
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    depends_on:
      - mysql-master
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-ChangeMe123!}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - db-network

  orchestrator:
    image: openark/orchestrator:latest
    container_name: orchestrator
    restart: unless-stopped
    environment:
      ORCHESTRATOR_USER: root
      ORCHESTRATOR_PASSWORD: ${DB_ROOT_PASS:-ChangeMe123!}
      ORCHESTRATOR_SERVERS: mysql-master:3306,mysql-slave:3306
    ports:
      - "3000:3000"
    depends_on:
      - mysql-master
      - mysql-slave
    networks:
      - db-network

volumes:
  mysql-master-data:
  mysql-slave-data:

networks:
  db-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
