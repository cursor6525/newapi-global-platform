# clusters/kustomization.yaml（或 fluxcd 环境清单）
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: infrastructure
spec:
  path: ./clusters/global/infrastructure
  interval: 1m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: edges
spec:
  path: ./clusters/edges/cn  # 按区域独立同步
  dependsOn: [{ name: infrastructure }]
  interval: 1m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: global-config
spec:
  path: ./clusters/global/apps
  dependsOn: [{ name: infrastructure }]
  interval: 1m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: regions
spec:
  path: ./clusters/regions/cn
  dependsOn: [{ name: edges }, { name: global-config }]
  interval: 1m
