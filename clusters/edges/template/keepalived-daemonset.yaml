# clusters/edges/template/keepalived-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
meta
  name: edge-keepalived
  namespace: kube-system
spec:
  selector: { matchLabels: { app: keepalived } }
  template:
    meta
      labels: { app: keepalived }
    spec:
      hostNetwork: true
      containers:
      - name: keepalived
        image: osixia/keepalived:2.2.7
        env:
        - name: KEEPALIVED_VIRTUAL_IPS
          value: "${EDGE_VIP}"  # 由部署脚本注入，如 192.168.1.200
        - name: KEEPALIVED_PRIORITY
          value: "${KEEPALIVED_PRIORITY}"  # 主节点 100，备节点 90
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
